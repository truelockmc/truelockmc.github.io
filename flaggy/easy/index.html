<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flaggen Lernen</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="top-controls">
            <button
                class="dark-mode-toggle"
                onclick="toggleDarkMode()"
                data-i18n="darkModeToggle"
            >
                Dunkelmodus
            </button>
            <button
                class="lang-toggle"
                onclick="toggleLang()"
                data-i18n="langToggle"
            >
                EN
            </button>
        </div>

        <header>
            <h1 data-i18n="title">Flaggen Lernen (BETA)</h1>
            <p data-i18n="subtitle">Errate das Land anhand der Flagge!</p>
        </header>

        <main>
            <div id="quiz-container">
                <div id="flag-image-container">
                    <img
                        id="flag-image"
                        src=""
                        data-i18n-alt="flagAlt"
                        alt="Flagge"
                    />
                </div>

                <div id="answers-container"></div>

                <div id="feedback" class="feedback"></div>
            </div>

            <div id="score-container">
                <p id="correct-score">
                    <span class="score-icon">&#9989;</span>
                    <span data-i18n="correctLabel">Richtige Antworten</span>:
                    <span id="correct-count">0</span>
                </p>
                <p id="incorrect-score">
                    <span class="score-icon">&#10060;</span>
                    <span data-i18n="incorrectLabel">Falsche Antworten</span>:
                    <span id="incorrect-count">0</span>
                </p>
            </div>
        </main>

        <script src="../data.js"></script>
        <script src="../shared.js"></script>
        <script src="script.js"></script>
    </body>
</html>
